name: Deploy to GitHub Pages

# DEAKTIVOVÁNO — EkonomOS deployujeme na Cloudflare Pages (ekonomos.velyos.cz),
# ne na GitHub Pages. Tento workflow zůstává v repu pro případ rollbacku,
# ale nespouští se. Pro reaktivaci: odstraň `if: false` z jobu `build` níže
# nebo nastav workflow_dispatch a spusť ručně.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
